<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feedback - ihavenocards</title>
    <link rel="stylesheet" href="../../css/feedback.css" />
  </head>
  <body>
    <nav>
      <a href="../../" class="logo">ihavenocards</a>

      <div class="nav-menu-wrapper">
        <button
          class="nav-toggle"
          aria-label="Toggle menu"
          aria-expanded="false"
        >
          ☰
        </button>

        <div class="nav-links">
          <a href="../about/">About</a>
          <a href="../feedback/">Feedback</a>
        </div>
      </div>
    </nav>

    <main>
      <h1>Send Feedback</h1>
      <p class="intro">Spotted a bug? Got an idea? We'd love to hear it.</p>

      <form
        action="https://formspree.io/f/xyzpyybl"
        method="POST"
        class="feedback-form"
      >
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Your Email</label>
        <input type="email" id="email" name="_replyto" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" maxlength="300" required oninput="updateCharCount()"></textarea>
        <small id="charCount">0 / 300</small>

        <button type="submit">Send Feedback</button>
      </form>
    </main>

    <footer>&copy; 2025 ihavenocards. All rights reserved.</footer>

    <script src="../../js/nav-button.js"></script>
    <script src="../../js/feedback-char-count.js"></script>
    <script src="../../js/analytics.js" defer></script>
  </body>
</html>
